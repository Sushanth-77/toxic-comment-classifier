split:
  val_size: 0.1
  random_state: 42

tfidf:
  max_features: 50000
  ngram_range: [1, 2]
  min_df: 2
  sublinear_tf: true
  strip_accents: unicode

bilstm:
  vocab_size: 50000
  max_len: 200

transformer:
  model_name: distilbert-base-uncased
  max_length: 256

mlflow:
  experiment_name: toxic-comment-classification
