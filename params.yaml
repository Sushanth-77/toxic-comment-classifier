split:
  val_size: 0.1
  random_state: 42

tfidf:
  max_features: 50000
  ngram_range: [1, 2]
  min_df: 2
  sublinear_tf: true
  strip_accents: unicode

bilstm:
  vocab_size: 50000
  max_len: 200
  embedding_dim: 128
  hidden_dim: 128
  dropout: 0.3
  batch_size: 64
  learning_rate: 0.001
  max_epochs: 15
  patience: 3
  seed: 42

transformer:
  model_name: distilbert-base-uncased
  max_length: 256
  batch_size: 16
  learning_rate: 2.0e-5
  max_epochs: 3
  patience: 1
  weight_decay: 0.01
  warmup_ratio: 0.1
  seed: 42

logreg:
  C: 1.0
  max_iter: 1000
  class_weight: balanced
  solver: liblinear

mlflow:
  experiment_name: toxic-comment-classification
